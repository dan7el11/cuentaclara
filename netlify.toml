# Configuración de Netlify.
# El comando de build y la carpeta publicada ya están definidos en la UI
# de Netlify (npm run build -> dist). Acá solo declaramos dónde viven las
# funciones serverless.

[functions]
  directory = "netlify/functions"
  # firebase-admin trae dependencias que el bundler no debe empacar: se
  # incluye como node_module tal cual (si no, falla el build de la función).
  external_node_modules = ["firebase-admin"]
