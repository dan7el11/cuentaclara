name: Android APK

# Compila la app web, la sincroniza con Capacitor y genera un APK de debug.
# Se dispara en push a la rama de trabajo, en tags v*, o a mano.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # Las VITE_* se hornean en el bundle. Definí estos secrets en el repo para
      # apuntar a tus servicios; sin ellos, la app corre en modo demo (mock).
      - name: Build web + sync Capacitor
        env:
          VITE_GETODDS_URL: ${{ secrets.VITE_GETODDS_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        run: |
          npm run build
          npx cap sync android

      # Opcional: si cargás el secret GOOGLE_SERVICES_JSON (google-services.json
      # en base64), se escribe para habilitar push nativo. Si no está, se omite.
      - name: Write google-services.json (si existe el secret)
        env:
          GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GS" ]; then
            echo "$GS" | base64 -d > android/app/google-services.json
            echo "google-services.json escrito: push nativo habilitado en este build."
          else
            echo "Sin GOOGLE_SERVICES_JSON: build sin push nativo."
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nobetter-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
