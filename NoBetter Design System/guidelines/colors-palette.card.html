<!-- @dsCard group="Colors" viewport="700x130" name="Palette" subtitle="8-color brand palette — deliberately anti-casino" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:16px; display:flex; gap:8px; background:#fff; }
  .sw { flex:1; display:flex; flex-direction:column; border-radius:6px; overflow:hidden; min-width:0; }
  .co { height:56px; }
  .la { padding:6px 8px; background:#fff; }
  .na { font-family:var(--font-sans); font-size:11px; font-weight:600; color:var(--color-text); }
  .hx { font-family:var(--font-mono); font-size:10px; color:var(--color-text-muted); }
</style>
</head>
<body>
  <div class="sw"><div class="co" style="background:#1C2430"></div><div class="la"><div class="na">ink</div><div class="hx">#1C2430</div></div></div>
  <div class="sw"><div class="co" style="background:#F3EFE6;border:1px solid #E3DCC9"></div><div class="la"><div class="na">paper</div><div class="hx">#F3EFE6</div></div></div>
  <div class="sw"><div class="co" style="background:#E3DCC9"></div><div class="la"><div class="na">paperline</div><div class="hx">#E3DCC9</div></div></div>
  <div class="sw"><div class="co" style="background:#3D5A73"></div><div class="la"><div class="na">slate</div><div class="hx">#3D5A73</div></div></div>
  <div class="sw"><div class="co" style="background:#2C4356"></div><div class="la"><div class="na">slate-dark</div><div class="hx">#2C4356</div></div></div>
  <div class="sw"><div class="co" style="background:#B98B3E"></div><div class="la"><div class="na">ochre</div><div class="hx">#B98B3E</div></div></div>
  <div class="sw"><div class="co" style="background:#7A2E2E"></div><div class="la"><div class="na">burgundy</div><div class="hx">#7A2E2E</div></div></div>
  <div class="sw"><div class="co" style="background:#5B6B4F"></div><div class="la"><div class="na">sage</div><div class="hx">#5B6B4F</div></div></div>
</body>
</html>
