<!-- @dsCard group="Brand" viewport="700x130" name="Ink Opacity Ramps" subtitle="Text hierarchy via ink transparency" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:16px 24px; background:#fff; display:flex; gap:0; }
  .ramp { flex:1; padding:8px; display:flex; flex-direction:column; gap:2px; border-right:1px solid var(--color-border); }
  .ramp:last-child { border-right:none; }
  .block { width:100%; height:32px; border-radius:4px; }
  .name { font-family:var(--font-mono); font-size:9px; color:var(--color-text-subtle); margin-top:4px; }
  .val { font-family:var(--font-mono); font-size:9px; color:var(--color-text-subtle); }
</style>
</head>
<body>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,1.00)"></div><div class="name">ink</div><div class="val">100%</div></div>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,0.70)"></div><div class="name">ink-70</div><div class="val">body copy</div></div>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,0.60)"></div><div class="name">ink-60</div><div class="val">labels</div></div>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,0.55)"></div><div class="name">ink-55</div><div class="val">subtitles</div></div>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,0.50)"></div><div class="name">ink-50</div><div class="val">captions</div></div>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,0.45)"></div><div class="name">ink-45</div><div class="val">metadata</div></div>
  <div class="ramp"><div class="block" style="background:rgba(28,36,48,0.30)"></div><div class="name">ink-30</div><div class="val">placeholders</div></div>
</body>
</html>
