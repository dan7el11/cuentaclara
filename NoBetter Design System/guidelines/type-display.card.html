<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--color-bg); }
  .row { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--color-border); }
  .row:last-child { border-bottom:none; }
  .label { font-family:var(--font-mono); font-size:10px; color:var(--color-text-subtle); width:100px; flex-shrink:0; }
  .specimen { font-family:var(--font-serif); color:var(--color-text); }
</style>
</head>
<body>
  <div class="row">
    <span class="label">36px / 700</span>
    <span class="specimen" style="font-size:36px;font-weight:700;letter-spacing:-0.01em;line-height:1.2">Tu cuenta ficticia</span>
  </div>
  <div class="row">
    <span class="label">30px / 400</span>
    <span class="specimen" style="font-size:30px;font-weight:400;letter-spacing:-0.01em;line-height:1.25">Extracto resumido</span>
  </div>
  <div class="row">
    <span class="label">24px / 400</span>
    <span class="specimen" style="font-size:24px;font-weight:400;line-height:1.3">Educación financiera</span>
  </div>
  <div class="row">
    <span class="label">20px / 400</span>
    <span class="specimen" style="font-size:20px;font-weight:400;line-height:1.35">Cómo gana la casa (siempre)</span>
  </div>
  <div class="row">
    <span class="label">17px / 400 italic</span>
    <span class="specimen" style="font-size:17px;font-weight:400;font-style:italic;line-height:1.4">Los mismos números, mirados como inversión</span>
  </div>
</body>
</html>
