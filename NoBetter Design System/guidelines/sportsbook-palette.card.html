<!-- @dsCard group="Sportsbook" viewport="700x160" name="Sportsbook Palette" subtitle="Dark theme — near-black indigo, violet accent, amber truth" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:16px; background:#0C0D17; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:8px; }
  .sw { flex:1; border-radius:8px; overflow:hidden; border:1px solid #2C2F4D; }
  .co { height:36px; }
  .la { padding:5px 8px; background:#181A2B; }
  .na { font-family:var(--font-sans); font-size:10px; font-weight:600; color:#F3F4FB; }
  .hx { font-family:var(--font-mono); font-size:9px; color:#7B7E9C; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="co" style="background:#0C0D17"></div><div class="la"><div class="na">bg</div><div class="hx">#0C0D17</div></div></div>
    <div class="sw"><div class="co" style="background:#181A2B"></div><div class="la"><div class="na">surface</div><div class="hx">#181A2B</div></div></div>
    <div class="sw"><div class="co" style="background:#282B47"></div><div class="la"><div class="na">surface-3</div><div class="hx">#282B47</div></div></div>
    <div class="sw"><div class="co" style="background:#2C2F4D"></div><div class="la"><div class="na">border</div><div class="hx">#2C2F4D</div></div></div>
    <div class="sw"><div class="co" style="background:#F3F4FB"></div><div class="la"><div class="na">text</div><div class="hx">#F3F4FB</div></div></div>
  </div>
  <div class="row">
    <div class="sw"><div class="co" style="background:#7B5CFF"></div><div class="la"><div class="na">accent (apostar)</div><div class="hx">#7B5CFF</div></div></div>
    <div class="sw"><div class="co" style="background:#1FD17A"></div><div class="la"><div class="na">cash / win</div><div class="hx">#1FD17A</div></div></div>
    <div class="sw"><div class="co" style="background:#FF3B5C"></div><div class="la"><div class="na">live</div><div class="hx">#FF3B5C</div></div></div>
    <div class="sw"><div class="co" style="background:#F5A524"></div><div class="la"><div class="na">truth (margen)</div><div class="hx">#F5A524</div></div></div>
    <div class="sw"><div class="co" style="background:linear-gradient(135deg,#7B5CFF,#5B8CFF)"></div><div class="la"><div class="na">grad-accent</div><div class="hx">violet→blue</div></div></div>
  </div>
</body>
</html>
