<!-- @dsCard group="Type" viewport="700x200" name="Mono & Figures" subtitle="IBM Plex Mono — all numbers, odds, and financial data" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--color-bg); }
  .row { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--color-border); }
  .row:last-child { border-bottom:none; }
  .label { font-family:var(--font-mono); font-size:10px; color:var(--color-text-subtle); width:110px; flex-shrink:0; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">36px / 600</span>
    <span style="font-family:var(--font-mono);font-size:36px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--color-text)">$1,250.00</span>
  </div>
  <div class="row">
    <span class="label">24px / 600</span>
    <span style="font-family:var(--font-mono);font-size:24px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--color-success)">$8,743.20</span>
    <span style="font-family:var(--font-sans);font-size:11px;color:var(--color-text-subtle);margin-left:4px">en 20 años</span>
  </div>
  <div class="row">
    <span class="label">15px / 600 odds</span>
    <span style="font-family:var(--font-mono);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--color-text)">2.10</span>
    <span style="font-family:var(--font-mono);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--color-text)">3.30</span>
    <span style="font-family:var(--font-mono);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--color-text)">3.40</span>
  </div>
  <div class="row">
    <span class="label">13px / 400 figure</span>
    <span style="font-family:var(--font-mono);font-size:13px;font-variant-numeric:tabular-nums;color:var(--color-text-muted)">dom 22 jun · 11:00 &nbsp;·&nbsp; −$24.00 &nbsp;·&nbsp; saldo $76.00</span>
  </div>
  <div class="row">
    <span class="label">11px / 500 micro</span>
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-text-subtle)">DINERO FICTICIO · SIN VALOR REAL</span>
  </div>
</body>
</html>
