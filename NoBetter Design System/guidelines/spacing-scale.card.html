<!-- @dsCard group="Spacing" viewport="700x200" name="Space Scale" subtitle="4px base grid — 16 steps" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:16px 20px; background:#fff; font-family:var(--font-mono); font-size:10px; color:var(--color-text-muted); }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .bar { background:var(--color-primary); height:10px; border-radius:2px; flex-shrink:0; }
  .name { width:60px; flex-shrink:0; }
  .val { color:var(--color-text-subtle); }
</style>
</head>
<body>
  <div class="row"><span class="name">--space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="name">--space-5</span><div class="bar" style="width:20px"></div><span class="val">20px</span></div>
  <div class="row"><span class="name">--space-6</span><div class="bar" style="width:24px"></div><span class="val">24px — card-pad</span></div>
  <div class="row"><span class="name">--space-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="name">--space-10</span><div class="bar" style="width:40px"></div><span class="val">40px — ledger-bar-height</span></div>
  <div class="row"><span class="name">--space-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="name">--space-16</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
</body>
</html>
